services:
  opencode-madame:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    image: localhost/opencode-madame:latest
    container_name: opencode-test
    network_mode: host
    privileged: true
    environment:
      - HOME=/root
      - PORT_OPENCODE=4098
      - MADAME_PORT=3001
    restart: "no"