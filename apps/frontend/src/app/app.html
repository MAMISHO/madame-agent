<div class="mochi-viewport">
  
  <!-- Panel 1: Navigation Deck -->
  <aside class="mochi-panel mochi-deck-nav">
    <div class="mochi-brand-card">
      <div class="mochi-avatar-squircle">M</div>
      <div class="mochi-brand-text">
        <h3>Madame-Agent</h3>
        <p>Orchestration Hub</p>
      </div>
    </div>
    
    <nav class="mochi-menu-list">
      <button (click)="currentView.set('stats')" class="mochi-menu-item" [class.active]="currentView() === 'stats'">
        <span class="icon">📊</span>
        <span>Madame-Stats</span>
      </button>
      <button (click)="currentView.set('harness')" class="mochi-menu-item" [class.active]="currentView() === 'harness'">
        <span class="icon">🕸️</span>
        <span>Madame-Harness</span>
      </button>
      <button (click)="currentView.set('resources')" class="mochi-menu-item" [class.active]="currentView() === 'resources'">
        <span class="icon">📦</span>
        <span>Providers & Resources</span>
      </button>
    </nav>
    
    <div class="mochi-footer">
      <p>v1.0.0 (Sequelize + SQLite)</p>
    </div>
  </aside>

  <!-- Feature Views -->
  @if (currentView() === 'stats') {
    <app-stats-page />
  }

  @if (currentView() === 'harness') {
    <app-harness-page />
  }

  @if (currentView() === 'resources') {
    <app-resources-page />
  }
  
</div>
