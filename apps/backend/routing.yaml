providers:
  local_small:
    type: ollama
    model: gemma4:12b-mlx
    base_url: http://localhost:11434
  local_medium:
    type: ollama
    model: gemma4:12b-mlx
    base_url: http://localhost:11434
  local_qwen:
    type: ollama
    model: qwen3.6:27b
    base_url: http://localhost:11434
  cloud_nvidia:
    type: cloud
    provider: nvidia
    model: meta/llama-3.3-70b-instruct
    api_key_env: NVIDIA_API_KEY
  cloud_nvidia_deepseek:
    type: cloud
    provider: nvidia
    model: deepseek-ai/deepseek-v4-flash
    api_key_env: NVIDIA_API_KEY
  cloud_google:
    type: cloud
    provider: google
    model: models/gemini-3.1-flash-lite
    api_key_env: GOOGLE_GENERATIVE_AI_API_KEY
  local_gemma_oc:
    type: ollama
    model: gemma4:12b-mlx-oc
    base_url: http://localhost:11434
  local_qwen_oc:
    type: ollama
    model: qwen3.6:27b-oc
    base_url: http://localhost:11434

routing:
  plan:
    provider: cloud_nvidia
  execution:
    provider: local_medium
  escalation:
    provider: cloud_nvidia
  subagent:
    providers:
      - local_gemma_oc
      - local_qwen_oc
      - local_medium
      - local_qwen

orchestrator_pairs:
  - id: deepseek-gemma-orch
    name: "DeepseekV4Flash-Orchestrator+Gemma4-12B"
    orchestrator: cloud_nvidia_deepseek
    subagents:
      - gemma4:12b-mlx-oc
      - gemma4:12b-mlx
      - qwen3.6:27b
  - id: llama-gemma-orch
    name: "Llama70B-Orchestrator+Gemma4-12B"
    orchestrator: cloud_nvidia
    subagents:
      - gemma4:12b-mlx-oc
      - gemma4:12b-mlx
      - qwen3.6:27b
  - id: deepseek-qwen-orch
    name: "DeepseekV4Flash-Orchestrator+Qwen27B"
    orchestrator: cloud_nvidia_deepseek
    subagents:
      - qwen3.6:27b-oc
      - qwen3.6:27b
      - gemma4:12b-mlx
  - id: llama-qwen-orch
    name: "Llama70B-Orchestrator+Qwen27B"
    orchestrator: cloud_nvidia
    subagents:
      - qwen3.6:27b-oc
      - qwen3.6:27b
      - gemma4:12b-mlx
  - id: deepseek-gemma-oc-orch
    name: "DeepseekV4Flash-Orchestrator+Gemma12B-OC"
    orchestrator: cloud_nvidia_deepseek
    subagents:
      - gemma4:12b-mlx-oc
      - qwen3.6:27b-oc
  - id: deepseek-qwen-oc-orch
    name: "DeepseekV4Flash-Orchestrator+Qwen27B-OC"
    orchestrator: cloud_nvidia_deepseek
    subagents:
      - qwen3.6:27b-oc
      - gemma4:12b-mlx-oc
  - id: gemini-qwen-oc-orch
    name: "Gemini-Orchestrator+Qwen27B-OC"
    orchestrator: cloud_google
    subagents:
      - qwen3.6:27b-oc
      - gemma4:12b-mlx-oc
  - id: gemini-gemma-oc-orch
    name: "Gemini-Orchestrator+Gemma12B-OC"
    orchestrator: cloud_google
    subagents:
      - gemma4:12b-mlx-oc
      - qwen3.6:27b-oc
  - id: llama-gemma-hybrid-orch
    name: "Llama70B-Orchestrator+Gemma4-Llama-Hybrid"
    orchestrator: cloud_nvidia
    subagents:
      - gemma4:12b-mlx-oc+Llama70B
      - gemma4:12b-mlx-oc
      - qwen3.6:27b-oc
  - id: deepseek-gemma-hybrid-orch
    name: "DeepseekV4Flash-Orchestrator+Gemma4-Deepseek-Hybrid"
    orchestrator: cloud_nvidia_deepseek
    subagents:
      - gemma4:12b-mlx-oc+DeepseekV4Flash
      - gemma4:12b-mlx-oc
      - qwen3.6:27b-oc
  - id: gemini-gemma-hybrid-orch
    name: "Gemini-Orchestrator+Gemma-Gemini-Hybrid"
    orchestrator: cloud_google
    subagents:
      - gemma4:12b-mlx-oc+Gemini
      - gemma4:12b-mlx-oc
  - id: gemini-qwen-hybrid-orch
    name: "Gemini-Orchestrator+Qwen-Gemini-Hybrid"
    orchestrator: cloud_google
    subagents:
      - qwen3.6:27b-oc+Gemini
      - qwen3.6:27b-oc


model_pairs:
  - id: gemma4-deepseek
    name: "Gemma4-12B+DeepseekV4Flash"
    local: local_medium
    cloud: cloud_nvidia_deepseek
  - id: gemma4-llama
    name: "Gemma4-12B+Llama70B"
    local: local_medium
    cloud: cloud_nvidia
  - id: qwen-deepseek
    name: "qwen3.6:27b+DeepseekV4Flash"
    local: local_qwen
    cloud: cloud_nvidia_deepseek
  - id: qwen-llama
    name: "qwen3.6:27b+Llama70B"
    local: local_qwen
    cloud: cloud_nvidia
  - id: qwen-deepseek-oc
    name: "qwen3.6:27b-oc+DeepseekV4Flash"
    local: local_qwen_oc
    cloud: cloud_nvidia_deepseek
  - id: gemma-deepseek-oc
    name: "gemma4:12b-mlx-oc+DeepseekV4Flash"
    local: local_gemma_oc
    cloud: cloud_nvidia_deepseek
  - id: qwen-gemini-oc
    name: "qwen3.6:27b-oc+Gemini"
    local: local_qwen_oc
    cloud: cloud_google
  - id: gemma-gemini-oc
    name: "gemma4:12b-mlx-oc+Gemini"
    local: local_gemma_oc
    cloud: cloud_google
  - id: gemma-llama-oc
    name: "gemma4:12b-mlx-oc+Llama70B"
    local: local_gemma_oc
    cloud: cloud_nvidia

translation:
  enabled: false
  model: gemma4:12b-mlx
  base_url: http://localhost:11434
  target_lang: en

cache:
  enabled: false
  threshold: 0.92
  max_entries: 500
  embedding_model: nomic-embed-text:latest
  embedding_base_url: http://localhost:11434

tools:
  enabled: true
  max_iterations: 40
  global_timeout_ms: -1
  sandbox:
    workspace: ${MADAME_WORKSPACE:-.}
    allowed_paths:
      - ~/.config/opencode/plugins/
    denied_commands:
      - rm
      - sudo
      - curl
      - wget
    max_timeout_ms: 30000
    allow_network: false
  builtin_tools:
    - read_file
    - write_file
    - glob_files
    - list_directory
    - move_file
    - copy_file
    - execute_command
    - create_directory
    - delete_file

confidence:
  threshold: 0.40
