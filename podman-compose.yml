services:
  opencode-test:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    image: localhost/opencode-madame:latest
    container_name: opencode-test
    network: host
    privileged: true
    environment:
      - HOME=/root
      - PORT_OPENCODE=${PORT_OPENCODE:-4098}
      - PORT_MADAME=${PORT_MADAME:-3001}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - no_proxy=${NO_PROXY:-}