providers:
  local_small:
    type: ollama
    model: gemma4:12b-mlx
    base_url: http://localhost:11434
  local_medium:
    type: ollama
    model: gemma4:12b-mlx
    base_url: http://localhost:11434
  local_qwen:
    type: ollama
    model: qwen3.6:27b
    base_url: http://localhost:11434
  cloud_nvidia:
    type: cloud
    provider: nvidia
    model: meta/llama-3.3-70b-instruct
    api_key_env: NVIDIA_API_KEY
  cloud_nvidia_deepseek:
    type: cloud
    provider: nvidia
    model: deepseek-ai/deepseek-v4-flash
    api_key_env: NVIDIA_API_KEY

routing:
  plan:
    provider: cloud_nvidia
  execution:
    provider: local_medium
  escalation:
    provider: cloud_nvidia

model_pairs:
  - id: gemma4-deepseek
    name: "Gemma4-12B+DeepseekV4Flash"
    local: local_medium
    cloud: cloud_nvidia_deepseek
  - id: gemma4-llama
    name: "Gemma4-12B+Llama70B"
    local: local_medium
    cloud: cloud_nvidia
  - id: qwen-deepseek
    name: "qwen3.6:27b+DeepseekV4Flash"
    local: local_qwen
    cloud: cloud_nvidia_deepseek
  - id: qwen-llama
    name: "qwen3.6:27b+Llama70B"
    local: local_qwen
    cloud: cloud_nvidia

confidence:
  threshold: 0.70
