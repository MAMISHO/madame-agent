name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build all apps
        run: npm run package

      - name: Package release tarball
        run: |
          tar -czf /tmp/madame-agent.tar.gz \
            -C dist/apps/opencode-plugin \
            .

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          # Remove existing release + tag for this ref (from failed runs)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          # Create fresh release
          gh release create "$TAG" \
            /tmp/madame-agent.tar.gz \
            --title "$TAG" \
            --generate-notes
