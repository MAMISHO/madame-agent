name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build all apps
        run: npm run package

      - name: Package release tarball
        run: |
          tar -czf /tmp/madame-agent.tar.gz \
            -C dist/apps/opencode-plugin \
            .

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            /tmp/madame-agent.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes
