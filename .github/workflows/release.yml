name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build all apps
        run: npm run package

      - name: Package release tarball
        run: |
          tar -czf /tmp/madame-agent.tar.gz \
            -C dist/apps/opencode-plugin \
            .

      - uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: /tmp/madame-agent.tar.gz
          generateReleaseNotes: true
          skipIfReleaseExists: false
