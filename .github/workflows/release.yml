name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build all apps
        run: npm run package

      - name: Package release tarball
        run: |
          tar -czf /tmp/madame-agent.tar.gz \
            -C dist/apps/opencode-plugin \
            .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/madame-agent.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
